<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="css/container.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/contato.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <a href="index.html" class="logo">
          <img src="./images/Logo.svg" alt="Logo" />
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="nav-menu"
          aria-label="Abrir menu"
        >
          ☰
        </button>

        <nav class="nav-menu" id="nav-menu">
          <ul class="nav-list">
            <li class="nav-mobile-logo">
              <a class="nav-link" href="index.html"
                ><img src="./images/Logo.svg" alt="Logo"
              /></a>
            </li>
            <li><a class="nav-link" href="sobre.html">sobre</a></li>
            <li><a class="nav-link" href="portfolio.html">Portfolio</a></li>
            <li><a class="nav-link" href="novidades.html">Novidades</a></li>
            <li><a class="nav-link" href="contato.html" aria-current="page">Contato</a></li>
          </ul>
        </nav>

        <button
          class="menu-overlay"
          type="button"
          aria-label="Fechar menu"
        ></button>
      </div>
    </header>

    <main>
      <div class="about">
        <h1>Contato</h1>
      </div>

      <div class="container">
        <section class="contact-section" aria-label="Formulario de contato">
          <form class="contact-form" action="#" method="post">
            <h2>Vamos conversar</h2>
            <p>
              Preencha os campos abaixo e eu entro em contato com voce o mais
              rapido possivel.
            </p>

            <label for="nome">Nome</label>
            <input
              id="nome"
              name="nome"
              type="text"
              placeholder="Seu nome"
              required
            />

            <label for="email">E-mail</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="seu email@exemplo.com"
              required
            />

            <label for="assunto">Assunto</label>
            <input
              id="assunto"
              name="assunto"
              type="text"
              placeholder="Digite o assunto"
              required
            />

            <label for="mensagem">Mensagem</label>
            <textarea
              id="mensagem"
              name="mensagem"
              rows="5"
              placeholder="Escreva sua mensagem"
              required
            ></textarea>

            <button type="submit" class="primary-button">
              Enviar mensagem
            </button>
          </form>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-main">
          <div class="footer-social">
            <a href="">Facebook</a>
            <a href="">Instagram</a>
            <a href="">LinkedIn</a>
          </div>
          <div class="footer-copyright">
            <p>Copyright © 2026 Germano Schulze. All rights reserved.</p>
          </div>
        </div>
      </div>
    </footer>
    <script src="js/menu-mobile.js"></script>
  </body>
</html>
